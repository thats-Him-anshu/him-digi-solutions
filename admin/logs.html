<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activity Logs — HIM Digi Admin</title><meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar" id="admin-sidebar">
    <div class="sidebar-logo"><div class="sidebar-logo-text">HIM<span>.</span>Digi</div><div class="sidebar-logo-sub">Admin Panel</div></div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer"><div class="sidebar-user"><div class="sidebar-avatar" id="sidebar-avatar">H</div><div><div class="sidebar-user-name" id="sidebar-user-name"></div><div class="sidebar-user-role" id="sidebar-user-role"></div></div></div></div>
  </aside>
  <div class="admin-main">
    <header class="admin-topbar">
      <div class="topbar-left"><button class="hamburger-btn" id="hamburger-btn"><i class="ri-menu-line"></i></button><div class="topbar-title">Activity Logs</div></div>
      <div class="topbar-right">
        <button class="topbar-btn" onclick="clearLogs()" title="Clear logs"><i class="ri-delete-bin-line"></i></button>
        <div class="topbar-btn" onclick="Auth.logout()"><i class="ri-logout-box-line"></i></div>
      </div>
    </header>
    <main class="admin-content">
      <div class="page-header-admin">
        <div><h1>Activity Logs</h1><p>Track all admin actions and system events</p></div>
        <button class="btn btn-outline" onclick="exportCSV(DB.get('activity')||[],'activity-logs.csv')"><i class="ri-download-line"></i> Export</button>
      </div>
      <div class="card" id="logs-card">
        <div class="table-wrap">
          <table>
            <thead><tr><th>#</th><th>Event</th><th>Type</th><th>Time</th></tr></thead>
            <tbody id="logs-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>
<script src="js/admin.js"></script>
<script>
const user = Auth.require();
if (user) {
  buildSidebar(user, 'logs');
  function renderLogs() {
    const logs = DB.get('activity') || [];
    document.getElementById('logs-tbody').innerHTML = logs.map((l,i)=>`
      <tr>
        <td style="color:var(--muted);font-size:0.78rem">${logs.length-i}</td>
        <td><div style="display:flex;align-items:center;gap:10px">
          <div class="activity-icon" style="background:rgba(${l.color==='blue'?'59,130,246':l.color==='green'?'34,197,94':l.color==='orange'?'255,107,43':'112,112,160'},0.1);color:var(--${l.color||'muted'});width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center">
            <i class="${l.icon||'ri-history-line'}"></i>
          </div>
          <span style="font-size:0.85rem">${l.text}</span>
        </div></td>
        <td><span class="badge ${l.type==='lead'?'new':l.type==='login'?'converted':'contacted'}" style="text-transform:capitalize">${l.type||'system'}</span></td>
        <td style="font-size:0.78rem;color:var(--muted)">${l.time}</td>
      </tr>`).join('') || '<tr><td colspan="4"><div class="empty-state"><i class="ri-history-line"></i><h4>No activity yet</h4></div></td></tr>';
  }
  function clearLogs() {
    confirm_delete('Clear all activity logs?', () => { DB.set('activity',[]); renderLogs(); toast('Logs cleared'); });
  }
  renderLogs();
}
</script>
</body>
</html>
