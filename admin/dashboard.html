<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — HIM Digi Admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
<div class="admin-layout">
  <!-- Sidebar -->
  <aside class="admin-sidebar" id="admin-sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-text">HIM<span>.</span>Digi</div>
      <div class="sidebar-logo-sub">Admin Panel</div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebar-avatar">H</div>
        <div>
          <div class="sidebar-user-name" id="sidebar-user-name">Admin</div>
          <div class="sidebar-user-role" id="sidebar-user-role">Administrator</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="admin-main">
    <header class="admin-topbar">
      <div class="topbar-left">
        <button class="hamburger-btn" id="hamburger-btn"><i class="ri-menu-line"></i></button>
        <div>
          <div class="topbar-title">Dashboard</div>
        </div>
      </div>
      <div class="topbar-right">
        <a href="../index.html" target="_blank" class="topbar-btn" title="View Website"><i class="ri-external-link-line"></i></a>
        <div class="topbar-btn" id="notif-btn" title="Notifications">
          <i class="ri-notification-3-line"></i>
          <span class="notif-dot" id="notif-dot"></span>
        </div>
        <div class="topbar-btn" onclick="Auth.logout()" title="Logout"><i class="ri-logout-box-line"></i></div>
      </div>
    </header>

    <main class="admin-content">
      <!-- Welcome -->
      <div style="margin-bottom:24px">
        <h1 style="font-family:var(--font-d);font-size:1.5rem;font-weight:800;color:var(--white)" id="welcome-msg">Good morning, Himanshu 👋</h1>
        <p style="font-size:0.85rem;color:var(--muted);margin-top:4px" id="date-display"></p>
      </div>

      <!-- Stats -->
      <div class="stats-grid" id="stats-grid"></div>

      <!-- Charts + Activity -->
      <div style="display:grid;grid-template-columns:1.6fr 1fr;gap:20px;margin-bottom:20px" id="charts-row">
        <!-- Lead Chart -->
        <div class="card">
          <div class="card-header">
            <span class="card-title"><i class="ri-bar-chart-2-line" style="color:var(--orange)"></i> Leads This Week</span>
            <span style="font-size:0.75rem;color:var(--muted)">Last 7 days</span>
          </div>
          <div class="card-body">
            <div class="chart-placeholder" id="lead-chart"></div>
            <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:0.72rem;color:var(--muted)" id="chart-labels"></div>
          </div>
        </div>
        <!-- Activity -->
        <div class="card">
          <div class="card-header">
            <span class="card-title"><i class="ri-history-line" style="color:var(--cyan)"></i> Recent Activity</span>
          </div>
          <div class="card-body" style="padding:12px 16px" id="activity-feed"></div>
        </div>
      </div>

      <!-- Recent Leads -->
      <div class="card">
        <div class="card-header">
          <span class="card-title"><i class="ri-user-received-line" style="color:var(--orange)"></i> Recent Leads</span>
          <a href="leads.html" class="btn btn-sm btn-outline">View All</a>
        </div>
        <div class="table-wrap">
          <table id="recent-leads-table">
            <thead>
              <tr><th>Name</th><th>Service</th><th>Date</th><th>Status</th><th>Action</th></tr>
            </thead>
            <tbody id="recent-leads-body"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="js/admin.js"></script>
<script>
const user = Auth.require();
if (user) {
  buildSidebar(user, 'dashboard');

  // Welcome message
  const hour = new Date().getHours();
  const greet = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
  document.getElementById('welcome-msg').textContent = `${greet}, ${user.name} 👋`;
  document.getElementById('date-display').textContent = new Date().toLocaleDateString('en-IN', {weekday:'long',day:'numeric',month:'long',year:'numeric'});

  const leads = DB.get('leads') || [];
  const newLeads = leads.filter(l=>l.status==='new').length;
  const converted = leads.filter(l=>l.status==='converted').length;

  // Notification dot
  if (newLeads > 0) document.getElementById('notif-dot').style.display = 'block';

  // Stats
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card orange">
      <div class="stat-icon orange"><i class="ri-user-received-line"></i></div>
      <div class="stat-val">${leads.length}</div>
      <div class="stat-label">Total Leads</div>
      <div class="stat-change up"><i class="ri-arrow-up-line"></i> All time</div>
    </div>
    <div class="stat-card cyan">
      <div class="stat-icon cyan"><i class="ri-notification-badge-line"></i></div>
      <div class="stat-val">${newLeads}</div>
      <div class="stat-label">New Leads</div>
      <div class="stat-change ${newLeads>0?'up':''}"><i class="ri-${newLeads>0?'arrow-up':'checkbox-circle'}-line"></i> Needs attention</div>
    </div>
    <div class="stat-card green">
      <div class="stat-icon green"><i class="ri-checkbox-circle-line"></i></div>
      <div class="stat-val">${converted}</div>
      <div class="stat-label">Converted</div>
      <div class="stat-change up"><i class="ri-arrow-up-line"></i> ${leads.length?Math.round(converted/leads.length*100):0}% rate</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-icon blue"><i class="ri-article-line"></i></div>
      <div class="stat-val">3</div>
      <div class="stat-label">Blog Posts</div>
      <div class="stat-change up"><i class="ri-arrow-up-line"></i> Published</div>
    </div>`;

  // Chart
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const vals = [1,0,2,1,0,1,0];
  document.getElementById('lead-chart').innerHTML = vals.map((v,i)=>`
    <div class="chart-bar" style="height:${Math.max(v*40+20,8)}px" title="${days[i]}: ${v} leads"></div>`).join('');
  document.getElementById('chart-labels').innerHTML = days.map(d=>`<span>${d}</span>`).join('');

  // Activity
  const activity = DB.get('activity') || [];
  document.getElementById('activity-feed').innerHTML = activity.slice(0,6).map(a=>`
    <div class="activity-item">
      <div class="activity-icon" style="background:rgba(${a.color==='blue'?'59,130,246':a.color==='green'?'34,197,94':a.color==='orange'?'255,107,43':'112,112,160'},0.1);color:var(--${a.color})">
        <i class="${a.icon}"></i>
      </div>
      <div><div class="activity-text">${a.text}</div><div class="activity-time">${a.time}</div></div>
    </div>`).join('');

  // Recent leads
  document.getElementById('recent-leads-body').innerHTML = leads.slice(0,5).map(l=>`
    <tr>
      <td><strong>${l.name}</strong><br><span style="font-size:0.75rem;color:var(--muted)">${l.phone}</span></td>
      <td>${l.service.replace('-',' ').replace(/\b\w/g,c=>c.toUpperCase())}</td>
      <td>${l.date}</td>
      <td><span class="badge ${l.status}"><span class="badge-dot"></span>${l.status.charAt(0).toUpperCase()+l.status.slice(1)}</span></td>
      <td><a href="leads.html" class="btn btn-sm btn-outline">View</a></td>
    </tr>`).join('') || '<tr><td colspan="5" style="text-align:center;color:var(--muted)">No leads yet</td></tr>';
}
</script>
</body>
</html>
