<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — HIM Digi Solutions</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
<div class="login-page">
  <div class="login-glow"></div>
  <div class="login-card">
    <div class="login-logo">HIM<span>.</span>Digi<sup style="font-size:0.5rem;color:#00D4E8;vertical-align:super">®</sup></div>
    <div class="login-subtitle">Admin Panel — Sign in to continue</div>

    <div id="login-error" class="alert alert-error login-error" style="display:none">
      <i class="ri-error-warning-line"></i> <span id="error-msg">Invalid credentials.</span>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="login-email" class="form-control" placeholder="admin@himdigisolutions.in" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label" style="display:flex;justify-content:space-between">
          Password
          <a href="#" id="forgot-link" style="color:var(--cyan);font-size:0.75rem;text-transform:none;letter-spacing:0">Forgot password?</a>
        </label>
        <div style="position:relative">
          <input type="password" id="login-password" class="form-control" placeholder="••••••••" required autocomplete="current-password" />
          <button type="button" id="toggle-pw" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted);background:none;border:none;cursor:pointer;font-size:1rem">
            <i class="ri-eye-line"></i>
          </button>
        </div>
      </div>

      <div style="display:flex;align-items:center;gap:10px;margin-bottom:24px">
        <label class="toggle"><input type="checkbox" id="remember-me"><span class="toggle-slider"></span></label>
        <span style="font-size:0.83rem;color:var(--muted)">Remember this device</span>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px" id="login-btn">
        Sign In <i class="ri-arrow-right-line"></i>
      </button>
    </form>

    <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border)">
      <p style="font-size:0.75rem;color:var(--muted);text-align:center;margin-bottom:12px">Demo credentials:</p>
      <div style="display:flex;flex-direction:column;gap:6px">
        <div style="font-size:0.75rem;color:var(--muted);background:var(--surface2);padding:8px 12px;border-radius:6px">
          <strong style="color:var(--orange)">Admin:</strong> himanshu@himdigisolutions.in / HimDigi@2026
        </div>
        <div style="font-size:0.75rem;color:var(--muted);background:var(--surface2);padding:8px 12px;border-radius:6px">
          <strong style="color:var(--cyan)">Editor:</strong> editor@himdigisolutions.in / Editor@2026
        </div>
      </div>
    </div>

    <p style="font-size:0.72rem;color:var(--muted);text-align:center;margin-top:20px">
      <i class="ri-lock-line"></i> Secured admin area. Unauthorized access is prohibited.
    </p>
  </div>
</div>

<script src="js/admin.js"></script>
<script>
  // Redirect if already logged in
  if (Auth.current()) window.location.href = 'dashboard.html';

  document.getElementById('toggle-pw').addEventListener('click', function() {
    const pw = document.getElementById('login-password');
    const icon = this.querySelector('i');
    pw.type = pw.type === 'password' ? 'text' : 'password';
    icon.className = pw.type === 'password' ? 'ri-eye-line' : 'ri-eye-off-line';
  });

  document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('login-error');
    const errMsg = document.getElementById('error-msg');
    btn.innerHTML = '<i class="ri-loader-4-line"></i> Signing in...';
    btn.disabled = true;

    setTimeout(() => {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const user = Auth.login(email, password);

      if (user) {
        btn.innerHTML = '<i class="ri-checkbox-circle-line"></i> Success!';
        setTimeout(() => window.location.href = 'dashboard.html', 600);
      } else {
        errEl.style.display = 'flex';
        errMsg.textContent = 'Invalid email or password. Please try again.';
        btn.innerHTML = 'Sign In <i class="ri-arrow-right-line"></i>';
        btn.disabled = false;
        document.getElementById('login-password').value = '';
      }
    }, 800);
  });

  document.getElementById('forgot-link').addEventListener('click', function(e) {
    e.preventDefault();
    alert('Contact Himanshu on WhatsApp (+91 74483 40452) to reset your password.');
  });
</script>
</body>
</html>
